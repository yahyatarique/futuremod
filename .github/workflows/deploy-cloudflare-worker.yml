name: Deploy Studio (Wrangler)
run-name: Studio → Workers (${{ github.event_name }})

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: wrangler-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build Studio + packages
        run: pnpm build
        env:
          VITE_FUTUREMOD_ROOT_DOMAIN: ${{ vars.VITE_FUTUREMOD_ROOT_DOMAIN }}
          VITE_TLDRAW_LICENSE_KEY: ${{ secrets.VITE_TLDRAW_LICENSE_KEY }}

      # workers.dev routes + apex/wildcard in apps/studio/wrangler.toml are applied here only.
      # Pages “direct upload” / static-only uploads do NOT deploy src/worker.ts or [[routes]].
      - name: Deploy Worker + static assets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/studio
          command: deploy
