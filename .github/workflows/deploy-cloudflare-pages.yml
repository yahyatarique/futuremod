name: Deploy Studio (Cloudflare Pages)
run-name: Studio → Pages (${{ github.event_name }})

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Optional Vite env for production (vars / secrets in repo Settings → Secrets and variables → Actions)
      - name: Build Studio + packages
        run: pnpm build
        env:
          VITE_FUTUREMOD_ROOT_DOMAIN: ${{ vars.VITE_FUTUREMOD_ROOT_DOMAIN }}
          VITE_TLDRAW_LICENSE_KEY: ${{ secrets.VITE_TLDRAW_LICENSE_KEY }}

      # Create project `futuremod-studio` in Cloudflare Pages (same name), or change projectName below.
      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: futuremod-studio
          directory: apps/studio/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
