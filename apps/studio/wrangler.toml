# Workers static assets deploy. Cloudflare build runs from monorepo root — use either:
#   npx wrangler deploy --cwd apps/studio   OR   cd apps/studio && npx wrangler deploy
# Set `name` to match your Cloudflare Workers/Pages-app project slug if needed.
name = "futuremod-studio"
compatibility_date = "2026-05-03"

[assets]
directory = "./dist/"
not_found_handling = "single-page-application"
