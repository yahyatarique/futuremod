# Workers static assets deploy. Cloudflare build runs from monorepo root — use either:
#   npx wrangler deploy --cwd apps/studio   OR   cd apps/studio && npx wrangler deploy
#
# Routes: apex `futuremod.site` (Custom Domain) + subdomains via `*.futuremod.site/*` (zone route).
# Wildcard Custom Domains are not supported; `*.futuremod.site/*` does not match the naked apex.
# If apex DNS conflicts, remove stale CNAME/A before first deploy — see Cloudflare Custom Domains docs.
# Set `name` to match your Cloudflare Workers / Pages project slug if needed.
name = "futuremod-studio"
main = "src/worker.ts"
compatibility_date = "2026-05-03"

[build]
command = "npm run build"
# Default would watch all of `./src`, rerunning `vite build` on every React edit while `vite` already HMRs.
# Only paths that affect the Worker bundle (expand if worker imports grow).
watch_dir = ["src/worker.ts", "src/projects/project-seo.ts", "src/projects/project-visibility.ts"]

[[routes]]
pattern = "futuremod.site"
custom_domain = true

[[routes]]
pattern = "*.futuremod.site/*"
zone_name = "futuremod.site"

[assets]
directory = "./dist/"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Always run the worker first so it can intercept subdomain requests and
# inject __PAGE_DATA__ before falling through to the static SPA assets.
run_worker_first = true

# Non-secret Supabase config — used by the worker to verify JWTs on /api/publish.
# The anon key is safe to expose publicly (it is used client-side too).
[vars]
SUPABASE_URL = "https://ykrhexxljurjbowzfpeh.supabase.co"
SUPABASE_ANON_KEY = "sb_publishable_LWSMdLy-P0OO1Gw3FXvePQ_exKLCXK_"

[[kv_namespaces]]
binding = "PAGES_KV"
id = "bf2b9ac82f054fe0b42ce5ea16ec1d12"
