# Workers static assets deploy. Cloudflare build runs from monorepo root — use either:
#   npx wrangler deploy --cwd apps/studio   OR   cd apps/studio && npx wrangler deploy
#
# Subdomain renderer: add a wildcard custom domain in the Cloudflare dashboard
# (Workers → futuremod-studio → Settings → Domains & Routes) pointing
# *.futuremod.site to this worker so published project pages are served here.
name = "futuremod-studio"
main = "src/worker.ts"
compatibility_date = "2026-05-03"

[assets]
directory = "./dist/"
not_found_handling = "single-page-application"

[[kv_namespaces]]
binding = "PAGES_KV"
id = "bf2b9ac82f054fe0b42ce5ea16ec1d12"
